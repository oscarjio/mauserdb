<button
  class="btn-pdf-export"
  [class.loading]="isLoading"
  [disabled]="isLoading"
  (click)="exportPdf()"
  title="Exportera sidan som PDF"
>
  <i *ngIf="!isLoading && !exportError" class="fas fa-file-pdf me-1"></i>
  <i *ngIf="exportError && !isLoading" class="fas fa-exclamation-triangle me-1" style="color: #fc8181;"></i>
  <i *ngIf="isLoading" class="fas fa-spinner fa-spin me-1"></i>
  <span>{{ isLoading ? 'Genererar...' : (exportError ? 'PDF-export misslyckades' : 'Exportera PDF') }}</span>
</button>

<button
  class="btn-pdf-export"
  [class.loading]="isLoading"
  [disabled]="isLoading"
  (click)="exportPdf()"
  title="Exportera sidan som PDF"
>
  <i *ngIf="!isLoading" class="fas fa-file-pdf me-1"></i>
  <i *ngIf="isLoading" class="fas fa-spinner fa-spin me-1"></i>
  <span>{{ isLoading ? 'Genererar...' : 'Exportera PDF' }}</span>
</button>

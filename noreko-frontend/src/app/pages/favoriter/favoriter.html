<div class="favoriter-page">
  <div class="container-fluid">
    <div class="d-flex justify-content-between align-items-center mb-4">
      <h1 class="page-title"><i class="fas fa-star me-2" style="color:#ecc94b"></i>Mina favoriter</h1>
      <button class="btn btn-primary btn-sm" (click)="openAddDialog()">
        <i class="fas fa-plus me-1"></i>Lagg till sida
      </button>
    </div>

    <!-- Meddelanden -->
    <div class="alert alert-success py-2 px-3 mb-3" *ngIf="successMsg">
      <i class="fas fa-check-circle me-1"></i>{{ successMsg }}
    </div>
    <div class="alert alert-danger py-2 px-3 mb-3" *ngIf="error">
      <i class="fas fa-exclamation-circle me-1"></i>{{ error }}
    </div>

    <!-- Laddning -->
    <div class="text-center py-5" *ngIf="loading">
      <div class="spinner-border text-info" role="status">
        <span class="visually-hidden">Laddar...</span>
      </div>
      <p class="text-muted mt-2">Laddar favoriter...</p>
    </div>

    <!-- Tom lista -->
    <div class="empty-state text-center py-5" *ngIf="!loading && favoriter.length === 0 && !error">
      <i class="fas fa-star fa-3x mb-3" style="color:#4a5568"></i>
      <h4 class="text-muted">Inga favoriter sparade</h4>
      <p class="text-muted">Klicka "Lagg till sida" for att borja bygga dina snabbliankar.</p>
    </div>

    <!-- Favoritlista med kort -->
    <div class="row g-3" *ngIf="!loading && favoriter.length > 0">
      <div class="col-sm-6 col-md-4 col-lg-3 col-xl-2" *ngFor="let fav of favoriter; let i = index; trackBy: trackByIndex">
        <div class="favorit-card">
          <div class="favorit-card-top" [style.borderTopColor]="fav.color">
            <a [routerLink]="fav.route" class="favorit-link">
              <i [class]="fav.icon + ' favorit-icon'" [style.color]="fav.color"></i>
              <span class="favorit-label">{{ fav.label }}</span>
            </a>
          </div>
          <div class="favorit-card-actions">
            <button class="btn btn-sm btn-outline-secondary" (click)="moveUp(i)" [disabled]="i === 0" title="Flytta upp">
              <i class="fas fa-arrow-up"></i>
            </button>
            <button class="btn btn-sm btn-outline-secondary" (click)="moveDown(i)" [disabled]="i === favoriter.length - 1" title="Flytta ner">
              <i class="fas fa-arrow-down"></i>
            </button>
            <button class="btn btn-sm btn-outline-danger" (click)="removeFavorit(fav)" title="Ta bort">
              <i class="fas fa-trash"></i>
            </button>
          </div>
        </div>
      </div>
    </div>

    <!-- Lagg-till dialog (overlay) -->
    <div class="add-dialog-overlay" *ngIf="showAddDialog" (click)="closeAddDialog()">
      <div class="add-dialog" (click)="$event.stopPropagation()">
        <div class="add-dialog-header">
          <h5><i class="fas fa-plus-circle me-2"></i>Lagg till favorit</h5>
          <button class="btn-close btn-close-white" (click)="closeAddDialog()"></button>
        </div>
        <div class="add-dialog-search">
          <input type="text" class="form-control form-control-sm" placeholder="Sok bland sidor..." [(ngModel)]="searchQuery">
        </div>
        <div class="add-dialog-list">
          <div class="add-page-item" *ngFor="let page of filteredPages; trackBy: trackByIndex" (click)="addFavorit(page)">
            <i [class]="page.icon + ' me-2'" [style.color]="page.color"></i>
            <span>{{ page.label }}</span>
            <small class="text-muted ms-auto">{{ page.route }}</small>
          </div>
          <div class="text-center text-muted py-3" *ngIf="filteredPages.length === 0">
            Inga fler sidor att lagga till.
          </div>
        </div>
      </div>
    </div>
  </div>
</div>

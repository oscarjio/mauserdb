<div class="container-fluid py-4">
  <div class="row mb-4">
    <div class="col">
      <h2 class="page-title"><i class="fas fa-toggle-on me-2"></i>Feature Flags</h2>
      <p class="text-muted-custom">Hantera vilka funktioner som är synliga och vilken rollnivå som krävs.</p>
    </div>
    <div class="col-auto d-flex align-items-center">
      <button class="btn btn-primary" (click)="save()" [disabled]="saving || !hasChanges()">
        <i class="fas fa-save me-1"></i>{{ saving ? 'Sparar...' : 'Spara ändringar' }}
      </button>
    </div>
  </div>

  <div class="alert alert-success" *ngIf="message">
    <i class="fas fa-check-circle me-1"></i>{{ message }}
  </div>
  <div class="alert alert-danger" *ngIf="error">
    <i class="fas fa-exclamation-circle me-1"></i>{{ error }}
  </div>

  <div class="text-center py-5" *ngIf="loading">
    <div class="spinner-border text-info" role="status"></div>
    <p class="mt-2 text-muted-custom">Laddar feature flags...</p>
  </div>

  <div *ngIf="!loading && groups.length === 0 && !error" class="text-center py-5">
    <p class="text-muted-custom">Inga feature flags hittades.</p>
  </div>

  <div *ngFor="let group of groups; trackBy: trackByIndex" class="card dark-card mb-4">
    <div class="card-header">
      <h5 class="mb-0"><i class="fas fa-folder me-2"></i>{{ group.category }}</h5>
    </div>
    <div class="card-body p-0">
      <div class="table-responsive">
        <table class="table table-dark table-hover mb-0">
          <thead>
            <tr>
              <th style="width:40px">Aktiv</th>
              <th>Feature</th>
              <th>Nyckel</th>
              <th style="width:180px">Minsta roll</th>
            </tr>
          </thead>
          <tbody>
            <tr *ngFor="let flag of group.flags; trackBy: trackByIndex" [class.disabled-row]="!flag.enabled">
              <td>
                <div class="form-check form-switch">
                  <input class="form-check-input" type="checkbox" [(ngModel)]="flag.enabled"
                         [id]="'ff-' + flag.id">
                </div>
              </td>
              <td>
                <label [for]="'ff-' + flag.id" class="mb-0 cursor-pointer">{{ flag.label }}</label>
              </td>
              <td>
                <code class="feature-key">{{ flag.feature_key }}</code>
              </td>
              <td>
                <select class="form-select form-select-sm role-select" [(ngModel)]="flag.min_role">
                  <option *ngFor="let r of roles; trackBy: trackByIndex" [value]="r">{{ roleLabel(r) }}</option>
                </select>
              </td>
            </tr>
          </tbody>
        </table>
      </div>
    </div>
  </div>

  <div class="text-end mt-3" *ngIf="!loading && groups.length > 0">
    <button class="btn btn-primary" (click)="save()" [disabled]="saving || !hasChanges()">
      <i class="fas fa-save me-1"></i>{{ saving ? 'Sparar...' : 'Spara ändringar' }}
    </button>
  </div>
</div>

<div class="container-fluid mt-4">
  <div class="row">
    <div class="col-12">
      <div class="d-flex justify-content-between align-items-center mb-4">
        <h1 class="h3 mb-0">
          <i class="fas fa-id-badge me-2"></i>
          Operatörshantering
        </h1>
        <button class="btn btn-success" (click)="showAddForm = !showAddForm">
          <i class="fas fa-plus me-2"></i>
          Lägg till operatör
        </button>
      </div>

      <div *ngIf="loading" class="text-center text-muted">
        <i class="fas fa-spinner fa-spin me-2"></i>
        Laddar operatörer...
      </div>

      <div *ngIf="error" class="alert alert-danger" role="alert">
        <i class="fas fa-exclamation-triangle me-2"></i>
        {{ error }}
      </div>

      <!-- Add Form -->
      <div class="card mb-4" *ngIf="showAddForm">
        <div class="card-header">
          <h5 class="card-title mb-0">
            <i class="fas fa-plus me-2"></i>
            Ny operatör
          </h5>
        </div>
        <div class="card-body">
          <form (ngSubmit)="createOperator()" class="edit-form">
            <div class="row g-2 align-items-end">
              <div class="col-md-4">
                <label class="form-label">Namn</label>
                <input class="form-control form-control-sm" [(ngModel)]="addForm.name" name="add-name" placeholder="Operatörens namn" required />
              </div>
              <div class="col-md-2">
                <label class="form-label">PLC-nummer</label>
                <input class="form-control form-control-sm" [(ngModel)]="addForm.number" name="add-number" placeholder="T.ex. 101" type="number" min="1" required />
              </div>
              <div class="col-md-2">
                <button class="btn btn-success btn-sm w-100" type="submit">
                  <i class="fas fa-save me-1"></i>
                  Spara
                </button>
              </div>
              <div class="col-md-2">
                <button class="btn btn-secondary btn-sm w-100" type="button" (click)="showAddForm = false">
                  Avbryt
                </button>
              </div>
            </div>
          </form>
        </div>
      </div>

      <!-- Operators Card -->
      <div class="card mb-4" *ngIf="!loading">
        <div class="card-header bg-success text-white">
          <h5 class="card-title mb-0">
            <i class="fas fa-id-badge me-2"></i>
            Operatörer
          </h5>
        </div>
        <div class="card-body">
          <div class="table-responsive">
            <table class="table table-striped table-hover" *ngIf="operators.length">
              <thead class="table-dark">
                <tr>
                  <th>Namn</th>
                  <th>Nummer</th>
                  <th>Status</th>
                  <th>Skapad</th>
                  <th>Åtgärder</th>
                </tr>
              </thead>
              <tbody>
                <ng-container *ngFor="let op of operators">
                  <tr [class.inactive-row]="op.active === 0 || op.active === '0'">
                    <td><strong>{{ op.name }}</strong></td>
                    <td><span class="badge bg-info">#{{ op.number }}</span></td>
                    <td>
                      <span class="badge" [class.bg-success]="op.active == 1" [class.bg-secondary]="op.active == 0">
                        {{ op.active == 1 ? 'Aktiv' : 'Inaktiv' }}
                      </span>
                    </td>
                    <td>{{ op.created_at || '-' }}</td>
                    <td>
                      <div class="btn-group btn-group-sm" role="group">
                        <button class="btn btn-outline-primary" (click)="toggleExpand(op.id)" title="Redigera"
                                aria-label="Redigera operatör">
                          <i class="fas" [class.fa-edit]="!expanded[op.id]" [class.fa-times]="expanded[op.id]"></i>
                        </button>
                        <button class="btn btn-outline-warning" (click)="toggleActive(op)"
                                [title]="op.active == 1 ? 'Inaktivera' : 'Aktivera'"
                                [attr.aria-label]="op.active == 1 ? 'Inaktivera operatör' : 'Aktivera operatör'">
                          <i class="fas" [class.fa-ban]="op.active == 1" [class.fa-check-circle]="op.active == 0"></i>
                        </button>
                        <button class="btn btn-outline-danger" (click)="deleteOperator(op)" title="Ta bort operatör"
                                aria-label="Ta bort operatör">
                          <i class="fas fa-trash"></i>
                        </button>
                      </div>
                    </td>
                  </tr>
                  <tr *ngIf="expanded[op.id]" class="edit-row">
                    <td colspan="5">
                      <div class="card border-primary">
                        <div class="card-body">
                          <form (ngSubmit)="saveOperator(op)" class="edit-form">
                            <div class="row g-2 align-items-end">
                              <div class="col-md-4">
                                <label class="form-label">Namn</label>
                                <input class="form-control form-control-sm" [(ngModel)]="op.name" name="name-{{op.id}}" placeholder="Namn" required />
                              </div>
                              <div class="col-md-2">
                                <label class="form-label">PLC-nummer</label>
                                <input class="form-control form-control-sm" [(ngModel)]="op.number" name="number-{{op.id}}" placeholder="Nummer" type="number" min="1" required />
                              </div>
                              <div class="col-md-2">
                                <button class="btn btn-success btn-sm w-100" type="submit">
                                  <i class="fas fa-save me-1"></i>
                                  Spara
                                </button>
                              </div>
                              <div class="col-md-2">
                                <button class="btn btn-secondary btn-sm w-100" type="button" (click)="expanded[op.id] = false">
                                  Avbryt
                                </button>
                              </div>
                            </div>
                          </form>
                        </div>
                      </div>
                    </td>
                  </tr>
                </ng-container>
              </tbody>
            </table>
            <div *ngIf="!operators.length" class="text-center text-muted py-4">
              <i class="fas fa-info-circle me-2"></i>
              Inga operatörer registrerade. Klicka "Lägg till operatör" för att börja.
            </div>
          </div>
        </div>
      </div>

    </div>
  </div>
</div>

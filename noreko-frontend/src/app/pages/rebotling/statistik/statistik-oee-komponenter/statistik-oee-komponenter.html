<div class="row mb-4"><div class="col-12">
<div class="card h-100" style="background:#2d3748; border:1px solid #4a5568; border-radius:12px;"><div class="card-body p-4">
<div class="d-flex align-items-center justify-content-between flex-wrap gap-2 mb-3">
<h5 class="mb-0" style="color:#e2e8f0; font-size:1.05rem;"><i class="fas fa-chart-line me-2" style="color:#48bb78;"></i>OEE-komponenter — Tillgänglighet &amp; Kvalitet</h5>
<div class="d-flex align-items-center gap-2 flex-wrap">
<span style="color:#a0aec0; font-size:0.82rem;">Period:</span>
<button class="btn btn-sm" [class]="oeeComponentsDays===7 ? 'btn-success' : 'btn-outline-success'" (click)="oeeComponentsDays=7; loadOeeComponents()">7d</button>
<button class="btn btn-sm" [class]="oeeComponentsDays===14 ? 'btn-success' : 'btn-outline-success'" (click)="oeeComponentsDays=14; loadOeeComponents()">14d</button>
<button class="btn btn-sm" [class]="oeeComponentsDays===30 ? 'btn-success' : 'btn-outline-success'" (click)="oeeComponentsDays=30; loadOeeComponents()">30d</button>
<button class="btn btn-sm" [class]="oeeComponentsDays===90 ? 'btn-success' : 'btn-outline-success'" (click)="oeeComponentsDays=90; loadOeeComponents()">90d</button>
<div class="d-flex align-items-center gap-2 ms-2" style="border-left:1px solid #4a5568; padding-left:10px;">
<label class="d-flex align-items-center gap-1 mb-0" style="color:#68d391; font-size:0.82rem; cursor:pointer;"><input type="checkbox" [(ngModel)]="showTillganglighet" (change)="toggleOeeDataset('tillganglighet')">Tillgänglighet</label>
<label class="d-flex align-items-center gap-1 mb-0" style="color:#63b3ed; font-size:0.82rem; cursor:pointer;"><input type="checkbox" [(ngModel)]="showKvalitet" (change)="toggleOeeDataset('kvalitet')">Kvalitet</label></div>
<button class="btn btn-sm btn-outline-secondary" [disabled]="!oeeComponentsData || oeeComponentsData.length === 0" (click)="exportOeeComponentsCSV()"><i class="fas fa-download me-1"></i>Exportera CSV</button></div></div>
<div class="text-center py-5" *ngIf="oeeComponentsLoading"><div class="spinner-border text-success" role="status" style="width:2rem; height:2rem;"><span class="visually-hidden">Laddar...</span></div><p class="mt-2 mb-0" style="color:#a0aec0; font-size:0.9rem;">Hämtar OEE-komponentdata...</p></div>
<div class="text-center py-5" *ngIf="!oeeComponentsLoading && oeeComponentsData.length === 0"><i class="fas fa-chart-line fa-3x mb-3" style="color:#48bb78; opacity:0.3;"></i><p style="color:#a0aec0; margin:0;">Ingen OEE-komponentdata tillgänglig.</p></div>
<div style="height:280px; position:relative;" *ngIf="!oeeComponentsLoading && oeeComponentsData.length > 0"><canvas id="oeeComponentsChart"></canvas></div>
<p class="small mt-3 mb-0" style="color:#8fa3b8;" *ngIf="!oeeComponentsLoading && oeeComponentsData.length > 0">
<strong style="color:#a0aec0;">Tillgänglighet</strong> = körtid / (körtid + rasttid) &nbsp;|&nbsp;
<strong style="color:#a0aec0;">Kvalitet</strong> = godkänd IBC / (godkänd + kasserad) &nbsp;|&nbsp;
<strong style="color:#ecc94b;">WCM-mal</strong> = 85 % per komponent.</p>
</div></div></div></div>

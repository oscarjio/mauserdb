<div class="row mb-4">
  <div class="col-12">
    <div class="dark-card">
      <div class="card-header d-flex justify-content-between align-items-center flex-wrap gap-2">
        <div>
          <h5 class="mb-0">
            <i class="fas fa-map-marker-alt me-2" style="color:#e53e3e"></i>
            Annotationer
          </h5>
          <small class="text-muted">Markera driftstopp, helgdagar och andra händelser i graferna</small>
        </div>
        <div class="d-flex align-items-center gap-2">
          <select class="form-select form-select-sm bg-dark text-light border-secondary" style="width:auto"
                  [(ngModel)]="filterTyp" (change)="loadAnnotations()">
            <option value="">Alla typer</option>
            <option value="driftstopp">Driftstopp</option>
            <option value="helgdag">Helgdag</option>
            <option value="handelse">Händelse</option>
            <option value="ovrigt">Övrigt</option>
          </select>
          <button class="btn btn-sm btn-outline-success" (click)="showForm = !showForm">
            <i class="fas fa-plus me-1"></i>{{ showForm ? 'Dölj' : 'Lägg till' }}
          </button>
        </div>
      </div>

      <div class="card-body">

        <!-- Formulär för ny annotation -->
        <div *ngIf="showForm" class="annotation-form mb-4 p-3" style="background:#2d3748;border-radius:8px;">
          <h6 class="text-light mb-3"><i class="fas fa-plus-circle me-2"></i>Ny annotation</h6>
          <div class="row g-3">
            <div class="col-md-3">
              <label class="form-label text-muted small">Datum</label>
              <input type="date" class="form-control form-control-sm bg-dark text-light border-secondary"
                     [(ngModel)]="newDatum" />
            </div>
            <div class="col-md-3">
              <label class="form-label text-muted small">Typ</label>
              <select class="form-select form-select-sm bg-dark text-light border-secondary"
                      [(ngModel)]="newTyp">
                <option value="driftstopp">Driftstopp</option>
                <option value="helgdag">Helgdag</option>
                <option value="handelse">Händelse</option>
                <option value="ovrigt">Övrigt</option>
              </select>
            </div>
            <div class="col-md-3">
              <label class="form-label text-muted small">Titel</label>
              <input type="text" class="form-control form-control-sm bg-dark text-light border-secondary"
                     [(ngModel)]="newTitel" maxlength="120" placeholder="T.ex. Maskinservice" />
            </div>
            <div class="col-md-3">
              <label class="form-label text-muted small">Beskrivning (valfritt)</label>
              <input type="text" class="form-control form-control-sm bg-dark text-light border-secondary"
                     [(ngModel)]="newBeskrivning" placeholder="Frivillig detalj" />
            </div>
          </div>
          <div class="mt-3 d-flex gap-2">
            <button class="btn btn-sm btn-success" (click)="createAnnotation()"
                    [disabled]="saving || !newDatum || !newTitel">
              <i class="fas fa-save me-1"></i>Spara
            </button>
            <button class="btn btn-sm btn-outline-secondary" (click)="showForm = false">Avbryt</button>
          </div>
          <div *ngIf="formError" class="alert alert-danger mt-2 py-1 px-2 small">{{ formError }}</div>
          <div *ngIf="formSuccess" class="alert alert-success mt-2 py-1 px-2 small">{{ formSuccess }}</div>
        </div>

        <!-- Loading -->
        <div *ngIf="loading" class="text-center py-3">
          <div class="spinner-border text-danger" role="status"></div>
        </div>

        <!-- Tabell -->
        <div *ngIf="!loading && annotations.length > 0" class="table-responsive">
          <table class="table table-dark table-sm table-hover mb-0">
            <thead>
              <tr>
                <th>Datum</th>
                <th>Typ</th>
                <th>Titel</th>
                <th>Beskrivning</th>
                <th class="text-end">Åtgärd</th>
              </tr>
            </thead>
            <tbody>
              <tr *ngFor="let ann of annotations">
                <td>{{ ann.datum }}</td>
                <td>
                  <span class="badge" [style.background]="typColor(ann.typ)">
                    {{ typLabel(ann.typ) }}
                  </span>
                </td>
                <td>{{ ann.titel }}</td>
                <td class="text-muted">{{ ann.beskrivning || '-' }}</td>
                <td class="text-end">
                  <button class="btn btn-sm btn-outline-danger" (click)="confirmDelete(ann)"
                          [disabled]="deleting === ann.id" title="Ta bort">
                    <i class="fas fa-trash-alt"></i>
                  </button>
                </td>
              </tr>
            </tbody>
          </table>
        </div>

        <!-- Tom lista -->
        <div *ngIf="!loading && annotations.length === 0" class="text-center text-muted py-3">
          <i class="fas fa-info-circle me-2"></i>Inga annotationer hittades för valt intervall
        </div>

        <!-- Felmeddelande -->
        <div *ngIf="error" class="alert alert-danger mt-2 py-1 px-2 small">{{ error }}</div>
      </div>
    </div>
  </div>
</div>

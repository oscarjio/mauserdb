<div class="row mb-4">
  <div class="col-12">
    <div class="dark-card">
      <div class="card-header d-flex justify-content-between align-items-center flex-wrap gap-2">
        <div>
          <h5 class="mb-0"><i class="fas fa-chart-bar me-2" style="color:#a0aec0"></i>Cykeltrend -- IBC-produktion</h5>
          <small class="text-muted">Senaste {{ cycleTrendDays }} dagarna</small>
        </div>
        <div class="d-flex align-items-center gap-2">
          <div class="granularity-toggle">
            <button class="gran-btn" [class.active]="cycleTrendGranularity==='day'" (click)="setCycleTrendGranularity('day')">Per dag</button>
            <button class="gran-btn" [class.active]="cycleTrendGranularity==='shift'" (click)="setCycleTrendGranularity('shift')">Per skift</button>
          </div>
          <button class="btn btn-sm btn-outline-secondary" (click)="exportChart()" [disabled]="!cycleTrendLoaded || cycleTrendData.length === 0" title="Exportera graf som PNG">
            <i class="bi bi-download me-1"></i>{{ exportFeedback ? 'Exporterad!' : 'PNG' }}
          </button>
        </div>
      </div>
      <div class="card-body">
        <div class="text-center py-3" *ngIf="cycleTrendLoading"><div class="spinner-border text-secondary" role="status"></div></div>
        <div *ngIf="cycleTrendLoaded && !cycleTrendLoading && cycleTrendData.length > 0" style="height:240px;position:relative;">
          <canvas id="cycleTrendChart"></canvas>
        </div>
        <div *ngIf="cycleTrendLoaded && !cycleTrendLoading && cycleTrendData.length === 0" class="text-center text-muted py-3">
          <i class="fas fa-info-circle me-2"></i>Ingen trenddata tillganglig for vald period
        </div>
      </div>
    </div>
  </div>
</div>

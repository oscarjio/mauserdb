<div class="hub-page">
  <div class="hub-header">
    <h2><i class="fas fa-users-cog me-2"></i>Operatörsanalys</h2>
    <p class="hub-subtitle">Analys och uppföljning av operatörers prestanda, närvaro och trender</p>
  </div>

  <div class="tool-group">
    <div class="group-label">Analysverktyg</div>
    <div class="tool-grid">
      <a *ngFor="let card of cards" [routerLink]="card.route" class="tool-card">
        <div class="tool-icon" [style.color]="card.color">
          <i [class]="card.icon"></i>
        </div>
        <div class="tool-info">
          <div class="tool-title">{{ card.title }}</div>
          <div class="tool-desc">{{ card.desc }}</div>
        </div>
        <i class="fas fa-chevron-right tool-arrow"></i>
      </a>
    </div>
  </div>
</div>

<div class="klassificeringslinje-live-page container-fluid">
  <div class="freshness-indicator" [class]="freshnessClass">
    <span class="freshness-dot"></span>
    <span class="freshness-text">{{ freshnessLabel }}</span>
  </div>
  <div class="row g-4 align-items-stretch justify-content-center" style="min-height: 250px;">
    <div class="col-4 d-flex align-items-stretch">
      <div class="live-card flex-fill clock-card h-100 w-100 d-flex flex-column justify-content-center align-items-center">
        <div class="live-value live-clock">{{ now | date:'HH:mm' }}</div>
      </div>
    </div>
    <div class="col-4 d-flex align-items-stretch">
      <div class="live-card flex-fill h-100 w-100 d-flex flex-column justify-content-center align-items-center">
        <div class="live-label">Antal OK idag</div>
        <div class="live-value live-ibc-today text-success">{{ antalOkIdag }}</div>
        <div class="live-sub" *ngIf="skiftCount > 0">{{ skiftCount }} skift</div>
        <div class="live-sub text-muted" *ngIf="skiftCount === 0">Inget rapporterat</div>
      </div>
    </div>
    <div class="col-4 d-flex align-items-stretch">
      <div class="live-card flex-fill h-100 w-100 d-flex flex-column justify-content-center align-items-center">
        <div class="live-label">Kassation idag</div>
        <div class="live-value live-ibc-today text-danger">{{ antalEjOkIdag }}</div>
        <div class="live-sub text-muted" *ngIf="totaltIdag > 0">av {{ totaltIdag }} totalt</div>
      </div>
    </div>

    <div class="col-4 d-flex align-items-stretch">
      <div class="live-card flex-fill speedometer-wrapper h-100 w-100 d-flex flex-column justify-content-center align-items-center">
        <div class="speedometer speedometer-modern w-100">
          <svg viewBox="0 0 300 180" width="100%" height="100%">
            <defs>
              <linearGradient id="speedoRedK" x1="0" y1="0" x2="1" y2="0">
                <stop offset="0%" stop-color="#e74c3c"/>
                <stop offset="100%" stop-color="#e74c3c"/>
              </linearGradient>
              <linearGradient id="speedoYellowK" x1="0" y1="0" x2="1" y2="0">
                <stop offset="0%" stop-color="#f1c40f"/>
                <stop offset="100%" stop-color="#f1c40f"/>
              </linearGradient>
              <linearGradient id="speedoGreenK" x1="0" y1="0" x2="1" y2="0">
                <stop offset="0%" stop-color="#27ae60"/>
                <stop offset="100%" stop-color="#27ae60"/>
              </linearGradient>
            </defs>
            <path d="M60,160 A90,90 0 0,1 120,80" stroke="url(#speedoRedK)" stroke-width="24" fill="none" stroke-linecap="round"/>
            <path d="M120,80 A90,90 0 0,1 180,80" stroke="url(#speedoYellowK)" stroke-width="24" fill="none" stroke-linecap="round"/>
            <path d="M180,80 A90,90 0 0,1 240,160" stroke="url(#speedoGreenK)" stroke-width="24" fill="none" stroke-linecap="round"/>
            <g>
              <rect x="147" y="80" width="6" height="90" rx="3" fill="#fff" filter="url(#needleShadowK)" [attr.transform]="'rotate(' + needleRotation + ' 150 150)'"/>
              <circle cx="150" cy="150" r="14" fill="#222" stroke="#fff" stroke-width="4"/>
              <circle cx="150" cy="150" r="7" fill="#fff"/>
            </g>
            <filter id="needleShadowK" x="-50%" y="-50%" width="200%" height="200%">
              <feDropShadow dx="0" dy="4" stdDeviation="2" flood-color="#000" flood-opacity="0.4"/>
            </filter>
          </svg>
          <div class="speedometer-status mt-3 w-100 d-flex justify-content-center">
            <span class="badge w-100 text-center" [class]="statusBadgeClass">
              {{ skiftCount > 0 ? (kvalitetPct + '% – ' + statusText) : statusText }}
            </span>
          </div>
        </div>
      </div>
    </div>
  </div>
</div>
